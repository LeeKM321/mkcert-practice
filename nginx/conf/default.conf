# 해당 파일은 Nginx 설정 파일로, Docker Compose로 실행할 때 Nginx 컨테이너에서 사용된다.

# 로그 포맷 정의 (HTTPS 학습용)
log_format ssl_detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'ssl_protocol=$ssl_protocol ssl_cipher=$ssl_cipher '
                        'upstream_response_time=$upstream_response_time '
                        'request_time=$request_time';

# 액세스 로그를 표준 출력으로 전송 (Docker 로그로 확인 가능)
access_log /dev/stdout ssl_detailed;

# 에러 로그 레벨 설정 (SSL 디버깅용)
error_log /dev/stderr info;

# Spring Boot upstream 정의
upstream spring-boot-app {
    server spring-app:8080;

    # 업스트림 서버 상태 모니터링
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# HTTP → HTTPS 리다이렉션
server {
    listen 80;
    server_name localhost;
    return 301 https://$server_name$request_uri;
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    # SSL 인증서 설정
    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # SSL 세션 캐시 설정 (성능 향상)
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # 보안 헤더 설정
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 정적 파일 직접 서빙 (선택적)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Spring Boot 애플리케이션으로 프록시
    location / {
        proxy_pass http://spring-boot-app;

        # 프록시 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        # 프록시 설정
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # 업스트림 연결 유지 및 HTTP/1.1 사용
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 프록시 응답 시간 추가 (로깅용)
        add_header X-Upstream-Response-Time $upstream_response_time;
    }

    # Health Check 엔드포인트 (선택적 캐싱)
    location /actuator/health {
        proxy_pass http://spring-boot-app;
        proxy_cache_valid 200 10s;

        # 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
